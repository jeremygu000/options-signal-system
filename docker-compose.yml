services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8300:8300"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8300
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
