services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8400:8400"
    env_file:
      - path: .env
        required: false
    volumes:
      - ${HOME}/.market_data/parquet:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8400
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
