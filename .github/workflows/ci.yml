name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (black --check)
        run: uv run black --check app/ tests/

      - name: Type check (mypy --strict)
        run: uv run mypy app/

      - name: Test with coverage
        run: uv run pytest -v --tb=short --cov=app --cov-report=term-missing

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          flags: backend
        continue-on-error: true

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint (oxlint)
        run: npm run lint
        working-directory: web

      - name: Type check (tsgo)
        run: npm run typecheck
        working-directory: web

      - name: Format check (prettier)
        run: npx prettier --check .
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -f Dockerfile -t options-signal-backend .

      - name: Build frontend image
        run: docker build -f web/Dockerfile -t options-signal-frontend ./web
